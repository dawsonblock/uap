name: Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install -D markdownlint-cli

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Lint
        run: npx markdownlint-cli '**/*.md' --config .markdownlint.json --ignore archive

      - name: Check footnote integrity
        run: python3 scripts/check_footnotes.py

      - name: Check for stale/forbidden strings
        run: python3 scripts/check_stale_claims.py

      - name: Install Pandoc and XeLaTeX
        run: sudo apt-get update && sudo apt-get install -y pandoc texlive-xetex fonts-dejavu

      - name: Verify export builds
        run: make verify-build
